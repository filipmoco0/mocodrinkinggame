<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#0a0a0a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Drinking Games</title>
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/icon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:       #0a0a0a;
    --bg2:      #111111;
    --bg3:      #1a1a1a;
    --border:   #2a2a2a;
    --green:    #00ff88;
    --green2:   #00cc66;
    --amber:    #ffaa00;
    --red:      #ff4455;
    --cyan:     #00ddff;
    --dim:      #555555;
    --text:     #cccccc;
    --white:    #eeeeee;
    --font-mono: 'Share Tech Mono', monospace;
    --font-display: 'Bebas Neue', cursive;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-mono);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Scanline effect */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.08) 2px, rgba(0,0,0,0.08) 4px);
    pointer-events: none;
    z-index: 1000;
  }

  /* Noise texture */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    opacity: 0.03;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 999;
  }

  #app {
    max-width: 480px;
    margin: 0 auto;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── SCREENS ── */
  .screen {
    display: none;
    flex-direction: column;
    min-height: 100vh;
    padding: 20px 16px 32px;
    animation: fadeIn 0.2s ease;
  }
  .screen.active { display: flex; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── HEADER ── */
  .hdr {
    text-align: center;
    padding: 24px 0 20px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 24px;
  }

  .hdr-title {
    font-family: var(--font-display);
    font-size: clamp(28px, 8vw, 42px);
    letter-spacing: 3px;
    color: var(--green);
    text-shadow: 0 0 20px rgba(0,255,136,0.4);
    line-height: 1;
  }

  .hdr-sub {
    font-size: 11px;
    color: var(--dim);
    letter-spacing: 2px;
    margin-top: 6px;
    text-transform: uppercase;
  }

  .blink {
    animation: blink 1.2s step-end infinite;
  }
  @keyframes blink { 50% { opacity: 0; } }

  /* ── TERMINAL BOX ── */
  .term-box {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 16px;
    margin-bottom: 16px;
    position: relative;
  }

  .term-box::before {
    content: '● ● ●';
    position: absolute;
    top: 8px;
    left: 12px;
    font-size: 8px;
    color: var(--border);
    letter-spacing: 3px;
  }

  .term-box-inner { padding-top: 16px; }

  /* ── PROMPT INPUT ── */
  .prompt-line {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 12px;
  }

  .prompt-sign {
    color: var(--green);
    font-size: 16px;
    flex-shrink: 0;
  }

  .prompt-input {
    background: transparent;
    border: none;
    border-bottom: 1px solid var(--green);
    color: var(--white);
    font-family: var(--font-mono);
    font-size: 16px;
    flex: 1;
    outline: none;
    padding: 4px 0;
    caret-color: var(--green);
  }

  .prompt-input::placeholder { color: var(--dim); }

  /* ── BUTTONS ── */
  .btn {
    display: block;
    width: 100%;
    padding: 14px 20px;
    background: transparent;
    border: 1px solid var(--green);
    color: var(--green);
    font-family: var(--font-mono);
    font-size: 14px;
    letter-spacing: 1px;
    cursor: pointer;
    border-radius: 2px;
    transition: all 0.15s;
    text-align: left;
    position: relative;
    overflow: hidden;
  }

  .btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--green);
    opacity: 0;
    transition: opacity 0.15s;
  }

  .btn:active::before { opacity: 0.1; }
  .btn:active { transform: scale(0.98); }

  .btn-num {
    color: var(--dim);
    margin-right: 10px;
    font-size: 12px;
  }

  .btn-emoji { margin-right: 8px; }

  .btn + .btn { margin-top: 8px; }

  .btn-amber {
    border-color: var(--amber);
    color: var(--amber);
  }

  .btn-red {
    border-color: var(--red);
    color: var(--red);
  }

  .btn-cyan {
    border-color: var(--cyan);
    color: var(--cyan);
  }

  .btn-dim {
    border-color: var(--border);
    color: var(--dim);
    font-size: 12px;
  }

  .btn-big {
    padding: 18px 20px;
    font-size: 16px;
    text-align: center;
    background: var(--green);
    color: var(--bg);
    font-family: var(--font-display);
    letter-spacing: 3px;
    border-color: var(--green);
  }

  .btn-big:active { background: var(--green2); }
  .btn-big::before { display: none; }

  /* ── TAGS ── */
  .tag {
    display: inline-block;
    font-size: 10px;
    padding: 2px 8px;
    border-radius: 2px;
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-right: 6px;
  }

  .tag-green { background: rgba(0,255,136,0.1); color: var(--green); border: 1px solid rgba(0,255,136,0.3); }
  .tag-amber { background: rgba(255,170,0,0.1); color: var(--amber); border: 1px solid rgba(255,170,0,0.3); }
  .tag-red   { background: rgba(255,68,85,0.1);  color: var(--red);   border: 1px solid rgba(255,68,85,0.3); }
  .tag-cyan  { background: rgba(0,221,255,0.1);  color: var(--cyan);  border: 1px solid rgba(0,221,255,0.3); }

  /* ── GAME CARD ── */
  .game-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 20px 16px;
    margin-bottom: 16px;
    animation: fadeIn 0.3s ease;
  }

  .game-card-title {
    font-family: var(--font-display);
    font-size: 22px;
    letter-spacing: 2px;
    color: var(--white);
    margin-bottom: 4px;
  }

  .game-card-sub {
    font-size: 11px;
    color: var(--dim);
    margin-bottom: 16px;
    letter-spacing: 1px;
  }

  /* ── STATEMENT ── */
  .statement {
    font-size: clamp(15px, 4vw, 18px);
    color: var(--white);
    line-height: 1.6;
    padding: 16px;
    background: var(--bg3);
    border-left: 3px solid var(--green);
    border-radius: 0 4px 4px 0;
    margin-bottom: 16px;
  }

  .statement.amber { border-left-color: var(--amber); }
  .statement.red   { border-left-color: var(--red); }
  .statement.cyan  { border-left-color: var(--cyan); }

  /* ── PLAYER CHIPS ── */
  .players-row {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 16px;
  }

  .player-chip {
    padding: 4px 12px;
    border-radius: 2px;
    font-size: 12px;
    border: 1px solid;
  }

  /* ── SCOREBOARD ── */
  .score-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
  }

  .score-rank { color: var(--dim); font-size: 12px; width: 20px; flex-shrink: 0; }
  .score-name { flex: 1; color: var(--white); font-size: 14px; min-width: 0; }
  .score-bar-wrap { flex: 2; min-width: 60px; height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; }
  .score-bar { height: 100%; background: var(--green); border-radius: 3px; transition: width 0.4s ease; }
  .score-sips { color: var(--amber); font-size: 13px; width: 60px; text-align: right; flex-shrink: 0; }

  /* ── ROUND COUNTER ── */
  .round-badge {
    font-size: 11px;
    color: var(--dim);
    letter-spacing: 1px;
    margin-bottom: 8px;
  }

  /* ── TURN HEADER ── */
  .turn-hdr {
    text-align: center;
    padding: 12px 0 16px;
    margin-bottom: 4px;
  }

  .turn-name {
    font-family: var(--font-display);
    font-size: 28px;
    letter-spacing: 3px;
    margin-bottom: 2px;
  }

  .turn-sub { font-size: 11px; color: var(--dim); letter-spacing: 2px; }

  /* ── SPIN ANIMATION ── */
  .spin-result {
    text-align: center;
    padding: 24px;
    animation: pulse 0.5s ease;
  }

  @keyframes pulse {
    0%   { transform: scale(0.8); opacity: 0; }
    60%  { transform: scale(1.05); }
    100% { transform: scale(1); opacity: 1; }
  }

  .spin-bottle { font-size: 48px; display: block; margin-bottom: 8px; }
  .spin-name { font-family: var(--font-display); font-size: 32px; letter-spacing: 3px; color: var(--red); }
  .spin-arrow { font-size: 14px; color: var(--dim); margin-bottom: 4px; }

  /* ── VOTE GRID ── */
  .vote-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-bottom: 16px;
  }

  .vote-btn {
    padding: 14px 8px;
    border: 1px solid var(--border);
    background: var(--bg2);
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 13px;
    border-radius: 2px;
    cursor: pointer;
    text-align: center;
    transition: all 0.15s;
  }

  .vote-btn.selected-green { border-color: var(--green); color: var(--green); background: rgba(0,255,136,0.05); }
  .vote-btn.selected-red   { border-color: var(--red);   color: var(--red);   background: rgba(255,68,85,0.05); }
  .vote-btn:active { transform: scale(0.96); }

  /* ── RESULT BOX ── */
  .result-box {
    text-align: center;
    padding: 20px;
    border: 1px solid var(--border);
    border-radius: 4px;
    margin-bottom: 16px;
    background: var(--bg2);
  }

  .result-emoji { font-size: 36px; margin-bottom: 8px; }
  .result-text  { font-size: 14px; color: var(--white); line-height: 1.5; }
  .result-sips  { font-family: var(--font-display); font-size: 28px; color: var(--red); letter-spacing: 2px; margin-top: 8px; }

  /* ── TIMER ── */
  .timer-ring {
    width: 80px; height: 80px;
    border-radius: 50%;
    border: 3px solid var(--green);
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 16px;
    font-family: var(--font-display);
    font-size: 28px;
    color: var(--green);
    transition: border-color 0.3s, color 0.3s;
  }
  .timer-ring.danger { border-color: var(--red); color: var(--red); }

  /* ── NAV BAR ── */
  .nav-bar {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: var(--bg2);
    border-top: 1px solid var(--border);
    display: flex;
    z-index: 100;
    max-width: 480px;
    margin: 0 auto;
  }

  .nav-btn {
    flex: 1;
    padding: 12px 8px;
    background: none;
    border: none;
    color: var(--dim);
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 1px;
    cursor: pointer;
    text-align: center;
    transition: color 0.15s;
  }

  .nav-btn:active { color: var(--green); }
  .nav-btn-icon { font-size: 18px; display: block; margin-bottom: 2px; }

  /* ── MISC ── */
  .divider {
    height: 1px;
    background: var(--border);
    margin: 16px 0;
  }

  .label {
    font-size: 10px;
    color: var(--dim);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .pb32 { padding-bottom: 80px; }
  @media (min-width: 768px) { .pb32 { padding-bottom: 24px; } }

  .center { text-align: center; }

  .mt8  { margin-top: 8px; }
  .mt16 { margin-top: 16px; }
  .mt24 { margin-top: 24px; }

  .color-green  { color: var(--green); }
  .color-amber  { color: var(--amber); }
  .color-red    { color: var(--red); }
  .color-cyan   { color: var(--cyan); }
  .color-dim    { color: var(--dim); }
  .color-white  { color: var(--white); }

  /* Input number */
  input[type=number] {
    -moz-appearance: textfield;
    background: transparent;
    border: none;
    border-bottom: 1px solid var(--green);
    color: var(--white);
    font-family: var(--font-mono);
    font-size: 20px;
    width: 60px;
    text-align: center;
    outline: none;
    caret-color: var(--green);
    padding: 4px 0;
  }
  input[type=number]::-webkit-outer-spin-button,
  input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; }

  /* Pulse dot */
  .pulse-dot {
    display: inline-block;
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--green);
    margin-right: 6px;
    animation: pulseDot 1.5s ease infinite;
  }
  @keyframes pulseDot {
    0%, 100% { opacity: 1; transform: scale(1); }
    50%       { opacity: 0.4; transform: scale(0.7); }
  }

  /* Card flip for Kings */
  .card-display {
    text-align: center;
    padding: 24px 16px;
    background: var(--bg3);
    border: 2px solid var(--amber);
    border-radius: 8px;
    margin-bottom: 16px;
    animation: cardFlip 0.3s ease;
  }
  @keyframes cardFlip {
    from { transform: rotateY(90deg); opacity: 0; }
    to   { transform: rotateY(0deg); opacity: 1; }
  }
  .card-rank { font-family: var(--font-display); font-size: 48px; color: var(--amber); letter-spacing: 4px; }
  .card-suit { font-size: 24px; margin-bottom: 4px; }
  .card-rule { font-family: var(--font-display); font-size: 18px; color: var(--white); letter-spacing: 2px; margin-bottom: 8px; }
  .card-desc { font-size: 13px; color: var(--text); line-height: 1.5; }

  /* Kings cup fill */
  .kings-row {
    display: flex;
    gap: 8px;
    justify-content: center;
    margin-bottom: 16px;
  }
  .king-icon { font-size: 24px; opacity: 0.2; transition: opacity 0.3s; }
  .king-icon.drawn { opacity: 1; }

  /* Spin animation */
  @keyframes spinBottle {
    0%   { transform: rotate(0deg); }
    100% { transform: rotate(var(--spin-deg)); }
  }
  .bottle-spinner {
    font-size: 48px;
    display: inline-block;
    transform-origin: center;
  }
  .bottle-spinner.spinning {
    animation: spinBottle var(--spin-dur) cubic-bezier(0.17, 0.67, 0.12, 1) forwards;
  }

  /* ── DESKTOP LAYOUT (768px+) ── */
  @media (min-width: 768px) {
    #app {
      max-width: 900px;
      flex-direction: row;
      align-items: flex-start;
      min-height: 100vh;
    }

    /* Left panel — fixed sidebar */
    .screen {
      padding: 32px 40px 48px;
    }

    /* On desktop the active screen takes full width unless it's the menu,
       which gets a two-column treatment */
    .screen.active {
      width: 100%;
    }

    /* Login screen — centered card on desktop */
    #screen-login.active {
      max-width: 480px;
      margin: 0 auto;
      min-height: 100vh;
      justify-content: center;
    }

    /* Home screen — wider, two-column player setup */
    #screen-home .term-box {
      max-width: 560px;
      margin-left: auto;
      margin-right: auto;
    }

    #screen-home .btn-big {
      max-width: 560px;
      margin-left: auto;
      margin-right: auto;
    }

    /* Menu screen — game list in a 2-col grid */
    #screen-menu {
      max-width: 900px;
    }

    #game-list {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    #game-list .btn + .btn {
      margin-top: 0;
    }

    /* Game screen — wider content */
    #screen-game #game-content {
      max-width: 640px;
      margin: 0 auto;
      width: 100%;
    }

    /* Scoreboard — centered narrower */
    #screen-scoreboard #scoreboard-list {
      max-width: 640px;
      margin: 0 auto;
      width: 100%;
    }

    .score-row {
      padding: 14px 0;
      font-size: 16px;
    }

    .score-name { font-size: 16px; }
    .score-sips { font-size: 15px; width: 70px; }
    .score-bar-wrap { height: 8px; }
    .score-rank { font-size: 14px; width: 28px; }

    /* Nav bar — attach to bottom of content, not full viewport */
    .nav-bar {
      position: sticky;
      bottom: 0;
      left: unset;
      right: unset;
      max-width: 900px;
      border-radius: 0 0 4px 4px;
      margin-top: auto;
    }

    .nav-btn {
      font-size: 13px;
      padding: 16px 12px;
    }

    .nav-btn-icon {
      font-size: 22px;
      margin-bottom: 4px;
    }

    /* Bigger fonts for desktop */
    .hdr-title {
      font-size: 52px;
    }

    .btn {
      font-size: 15px;
      padding: 16px 24px;
    }

    .btn-big {
      padding: 20px 24px;
      font-size: 16px;
    }

    /* Term box wider */
    .term-box {
      padding: 20px 24px;
    }

    /* Statement / turn cards wider */
    .statement {
      font-size: 15px;
    }

    .turn-hdr {
      margin: 24px 0 16px;
    }

    .turn-name {
      font-size: clamp(24px, 4vw, 36px);
    }
  }

  @media (min-width: 1100px) {
    #app {
      max-width: 1000px;
    }

    #game-list {
      grid-template-columns: 1fr 1fr 1fr;
    }
  }
</style>
</head>
<body>
<div id="app">

  <!-- ══ SCREEN: LOGIN ══ -->
  <div class="screen active" id="screen-login">
    <div class="hdr">
      <div class="hdr-title">DRINKING<br>GAMES</div>
      <div class="hdr-sub">v1.0 <span class="blink">█</span></div>
    </div>
    <div style="text-align:center;font-size:10px;color:var(--dim);margin-bottom:16px;letter-spacing:2px">by moco</div>

    <div class="term-box">
      <div class="term-box-inner">
        <div class="label">$ auth --login</div>
        <div class="prompt-line">
          <span class="prompt-sign">&gt;</span>
          <input class="prompt-input" id="login-email" type="email" placeholder="email" autocomplete="email" spellcheck="false">
        </div>
        <div class="prompt-line" style="margin-top:8px">
          <span class="prompt-sign">&gt;</span>
          <input class="prompt-input" id="login-password" type="password" placeholder="password" autocomplete="current-password">
        </div>
        <div id="login-error" style="color:var(--red);font-size:12px;margin-top:8px;display:none"></div>
      </div>
    </div>

    <button class="btn btn-big mt8" onclick="doLogin()" id="login-btn">SIGN IN</button>
    <div class="divider"></div>
    <div class="label center" style="color:var(--dim)">drink.moco.wtf</div>
  </div>

  <!-- ══ SCREEN: HOME ══ -->
  <div class="screen" id="screen-home">
    <div class="hdr">
      <div class="hdr-title">DRINKING<br>GAMES</div>
      <div class="hdr-sub">v1.0 <span class="blink">█</span></div>
    </div>

    <div class="term-box">
      <div class="term-box-inner">
        <div class="label">$ players --setup</div>
        <div class="prompt-line" style="margin-bottom:16px">
          <span class="prompt-sign">&gt;</span>
          <span style="color:var(--text);font-size:13px">How many players?</span>
          <input type="number" id="player-count" min="1" max="20" value="2" style="margin-left:auto">
        </div>
        <div id="player-names-wrap"></div>
        <button class="btn mt8" onclick="addPlayerField()">+ add player</button>
      </div>
    </div>

    <button class="btn btn-big mt16" onclick="goToMenu()">START GAME</button>
    <div class="divider"></div>
    <div class="label center">10 games included</div>
  </div>

  <!-- ══ SCREEN: MENU ══ -->
  <div class="screen" id="screen-menu">
    <div class="hdr">
      <div class="hdr-title">SELECT<br>GAME</div>
      <div class="hdr-sub" id="menu-players-line"></div>
    </div>
    <div id="game-list" class="pb32"></div>
    <div class="nav-bar">
      <button class="nav-btn" onclick="showScreen('screen-home')">
        <span class="nav-btn-icon">👥</span>players
      </button>
      <button class="nav-btn" onclick="showScoreboard()">
        <span class="nav-btn-icon">📊</span>scores
      </button>
      <button class="nav-btn" onclick="doLogout()">
        <span class="nav-btn-icon">🚪</span>logout
      </button>
    </div>
  </div>

  <!-- ══ SCREEN: SCOREBOARD ══ -->
  <div class="screen" id="screen-scoreboard">

// HELPERS
// ══════════════════════════════════════════════════════
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length-1; i>0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}

function pick(arr) { return arr[Math.floor(Math.random()*arr.length)]; }

function currentPlayer() { return state.players[state.turn % state.players.length]; }

function playerChips(players) {
  return `<div class="players-row">${players.map((p,i) => {
    const c = chipColor(i);
    return `<span class="player-chip" style="border-color:${c.border};color:${c.color}">${p}</span>`;
  }).join('')}</div>`;
}

function turnHeader(player, sub='YOUR TURN') {
  const i = state.players.indexOf(player);
  const c = chipColor(i);
  return `<div class="turn-hdr">
    <div class="turn-name" style="color:${c.color}">${player}</div>
    <div class="turn-sub">${sub}</div>
  </div>`;
}

function drinkResult(player, sips, msg='') {
  addSips(player, sips);
  return `<div class="result-box">
    <div class="result-emoji">🍺</div>
    <div class="result-text">${msg || `${player} drinks`}</div>
    <div class="result-sips">${sips} SIP${sips!==1?'S':''}</div>
  </div>`;
}

function safeResult(msg='Nice one! ✔') {
  return `<div class="result-box" style="border-color:var(--green)">
    <div class="result-emoji">✅</div>
    <div class="result-text color-green">${msg}</div>
  </div>`;
}

function setContent(html) {
  document.getElementById('game-content').innerHTML = html;
  window.scrollTo(0,0);
}

function nextTurn() {
  state.turn++;
  state.pendingAction = null;
  if (state.timerInterval) { clearInterval(state.timerInterval); state.timerInterval = null; }
  if (state.currentGame) renderGame(state.currentGame);
}

// ══════════════════════════════════════════════════════
// START GAME
// ══════════════════════════════════════════════════════
function startGame(id) {
  state.currentGame = id;
  state.turn = 0;
  state.round = 0;
  state.pendingAction = null;
  state.kingsDrawn = 0;
  state.gameRules = [];

  if (id === 'nhie') state.deck = shuffle(NHIE);
  if (id === 'mlt')  state.deck = shuffle(MLT_PROMPTS);
  if (id === 'wyr')  state.deck = shuffle(WYR_QUESTIONS);
  if (id === 'ht')   state.deck = shuffle(HOT_TAKES);
  if (id === 'rf')   state.deck = shuffle(RAPID_FIRE);
  if (id === 'conf') state.deck = shuffle(CONFESSIONS);
  if (id === 'tod')  { state.deck = shuffle(TRUTHS); state.deck2 = shuffle(DARES); }
  if (id === 'kings') {
    const d = [];
    SUITS.forEach(s => Object.keys(KINGS_RULES).forEach(r => d.push({rank:r,suit:s})));
    state.deck = shuffle(d);
  }
  if (id === 'ttl') { state.deck = []; state.ttlPhase = 'input'; state.ttlStatements = []; state.ttlLieIdx = 0; }
  if (id === 'stb') { state.spinning = false; }

  showScreen('screen-game');
  renderGame(id);
}

// ══════════════════════════════════════════════════════
// RENDER GAME
// ══════════════════════════════════════════════════════
function renderGame(id) {
  const fns = {
    tod: renderTOD, nhie: renderNHIE, stb: renderSTB,
    kings: renderKings, mlt: renderMLT, wyr: renderWYR,
    ht: renderHT, rf: renderRF, conf: renderConf, ttl: renderTTL,
  };
  if (fns[id]) fns[id]();
}

// ── TRUTH OR DARE ──────────────────────────────────────
function renderTOD() {
  const player = currentPlayer();
  if (state.pendingAction === 'show') {
    const isT = state.todType === 'truth';
    const card = isT ? pick(state.deck) : pick(state.deck2);
    setContent(`
      ${turnHeader(player)}
      <div class="round-badge">${isT ? '🎴 TRUTH' : '🎲 DARE'}</div>
      <div class="statement ${isT?'cyan':'amber'}">${card}</div>
      <button class="btn mt8" onclick="todComplete()">✔ completed</button>
      <button class="btn btn-red mt8" onclick="todSkip()">✘ skip (drink 3)</button>
    `);
    return;
  }
  if (state.pendingAction === 'result') {

function doSpin() {

  const candidates = state.players.filter(p => p !== player);

  }
  if (state.pendingAction === 'vote') { renderMLTVote(); return; }
  if (state.pendingAction === 'result') {
    setContent(`${state.mltResult}<button class="btn btn-dim mt16" onclick="mltNext()">next →</button>`);
    return;
  }
  state.round++;
  state.currentPrompt = state.deck.pop();
  state.mltVotes = {};
  state.pendingAction = 'vote';
  renderMLTVote();
}

function renderMLTVote() {
  const voted = Object.keys(state.mltVotes);
  const remaining = state.players.filter(p => !voted.includes(p));
  const voter = remaining[0];

  if (!voter) {
    const tally = {};
    state.players.forEach(p => tally[p] = 0);
    Object.values(state.mltVotes).forEach(v => tally[v] = (tally[v]||0)+1);
    const sorted = Object.entries(tally).sort((a,b)=>b[1]-a[1]);
    const winner = sorted[0][0];
    const winVotes = sorted[0][1];
    addSips(winner, winVotes);

    const bars = sorted.map(([name,votes],i) => {
      const c = chipColor(state.players.indexOf(name));
      const pct = Math.round(votes/state.players.length*100);
      return `<div class="score-row">
        <div class="score-name" style="color:${c.color}">${name}</div>
        <div class="score-bar-wrap" style="width:60px"><div class="score-bar" style="width:${pct}%;background:${c.color}"></div></div>
        <div class="score-sips">${votes} vote${votes!==1?'s':''}</div>
      </div>`;
    }).join('');

    state.mltResult = `<div class="game-card">${bars}</div>${drinkResult(winner, winVotes, `${winner} drinks ${winVotes} sip${winVotes!==1?'s':''}!`)}`;
    state.pendingAction = 'result';
    setContent(`${state.mltResult}<button class="btn btn-dim mt16" onclick="mltNext()">next →</button>`);
    return;
  }

  const i = state.players.indexOf(voter);
  const c = chipColor(i);
  setContent(`
    <div class="round-badge">ROUND ${state.round} · ${voted.length}/${state.players.length} voted</div>
    <div class="statement">${state.currentPrompt}</div>
    <div class="turn-hdr">
      <div class="turn-name" style="color:${c.color}">${voter}</div>
      <div class="turn-sub">VOTE</div>
    </div>
    <div style="display:flex;flex-direction:column;gap:8px">
      ${state.players.map((p,pi) => {
        const pc = chipColor(pi);
        return `<button class="vote-btn" style="border-color:${pc.border};color:${pc.color};text-align:left;padding:12px 16px" onclick="mltVote('${voter}','${p}')">${p}</button>`;
      }).join('')}
    </div>
  `);
}

function mltVote(voter, target) {
  state.mltVotes[voter] = target;
  renderMLTVote();
}

function mltNext() {
  state.pendingAction = null;
  renderMLT();
}

function renderWYRVote() {
  const [a, b] = state.currentWYR;
  const voted = Object.keys(state.wyrVotes);
  const remaining = state.players.filter(p => !voted.includes(p));
  const voter = remaining[0];

  if (!voter) {
    const aVoters = Object.entries(state.wyrVotes).filter(([,v])=>v==='A').map(([p])=>p);
    const bVoters = Object.entries(state.wyrVotes).filter(([,v])=>v==='B').map(([p])=>p);
    let result = '';
    if (aVoters.length === bVoters.length) {
      state.players.forEach(p => addSips(p,1));
      result = `<div class="result-box"><div class="result-emoji">🤝</div><div class="result-text">Tie! Everyone drinks 1 sip.</div></div>`;
    } else {
      const minority = aVoters.length < bVoters.length ? aVoters : bVoters;
      const sips = Math.abs(aVoters.length - bVoters.length);
      minority.forEach(p => addSips(p, sips));
      result = drinkResult(minority.join(', '), sips, `${minority.join(', ')} drink${minority.length>1?'':'s'} ${sips} sip${sips!==1?'s':''}!`);
    }
    state.wyrResult = `<div class="game-card">
      <div style="display:flex;gap:8px;margin-bottom:8px">
        <span class="tag tag-cyan">A: ${aVoters.join(', ')||'nobody'}</span>

      <div style="display:flex;gap:8px">
        <span class="tag tag-amber">B: ${bVoters.join(', ')||'nobody'}</span>

    </div>${result}`;
    state.pendingAction = 'result';
    setContent(`${state.wyrResult}<button class="btn btn-dim mt16" onclick="wyrNext()">next →</button>`);
    return;
  }

  const i = state.players.indexOf(voter);
  const c = chipColor(i);
  setContent(`
    <div class="round-badge">ROUND ${state.round} · ${voted.length}/${state.players.length} voted</div>
    <div class="turn-hdr">
      <div class="turn-name" style="color:${c.color}">${voter}</div>
      <div class="turn-sub">WOULD YOU RATHER</div>
    </div>
    <div class="vote-grid">
      <button class="vote-btn" onclick="wyrVote('${voter}','A')" style="min-height:80px">

      </button>
    </div>
  `);

  if (!voter) {
    const agree = Object.entries(state.htVotes).filter(([,v])=>v).map(([p])=>p);

      if (minority.length === 0) {
        result = safeResult('Nobody in the minority — no one drinks!');

  if (!state.deck.length) {
    setContent(`<div class="center mt24"><div style="font-size:48px">🤫</div><div class="game-card-title mt16">Game Over!</div></div>
    <button class="btn btn-dim mt16" onclick="showScoreboard()">view scoreboard</button>`);
    return;
  }
  if (state.pendingAction === 'confessed') { renderConfVote(); return; }
  if (state.pendingAction === 'result') {
    setContent(`${state.confResult}<button class="btn btn-dim mt16" onclick="confNext()">next →</button>`);
    return;
  }

  const player = currentPlayer();
  const prompt = state.deck.pop();
  state.currentConfPrompt = prompt;
  state.confVotes = {};
  setContent(`
    ${turnHeader(player)}
    <div class="statement">🤫 ${prompt}</div>
    <div class="label">confess out loud to the group, then tap done</div>
    <button class="btn mt8" onclick="confDone()">✔ confessed</button>
    <button class="btn btn-red mt8" onclick="confSkip()">✘ refuse (drink 3)</button>
  `);
}

function confSkip() {
  const player = currentPlayer();
  state.confResult = drinkResult(player, 3, `${player} refused — drink 3 sips!`);
  state.pendingAction = 'result';
  setContent(`${state.confResult}<button class="btn btn-dim mt16" onclick="confNext()">next →</button>`);
}

function confDone() {
  state.pendingAction = 'confessed';
  renderConfVote();
}

function renderConfVote() {
  const player = currentPlayer();
  const voters = state.players.filter(p => p !== player);
  const voted = Object.keys(state.confVotes);
  const remaining = voters.filter(p => !voted.includes(p));
  const voter = remaining[0];

  if (!voter) {
    const spicy = Object.values(state.confVotes).filter(Boolean).length;
    const total = voters.length;
    let result = '';
    if (spicy >= total/2) {
      result = safeResult('🌶️ Certified spicy! ' + player + ' is safe.');
    } else {
      addSips(player, 1);
      result = drinkResult(player, 1, 'Not spicy enough! ' + player + ' drinks 1 extra sip.');
    }
    state.confResult = result;
    state.pendingAction = 'result';
    setContent(`${result}<button class="btn btn-dim mt16" onclick="confNext()">next →</button>`);
    return;
  }

  const i = state.players.indexOf(voter);
  const c = chipColor(i);
  setContent(`
    <div class="label">was it spicy enough?</div>
    <div class="turn-hdr">
      <div class="turn-name" style="color:${c.color}">${voter}</div>
      <div class="turn-sub">VOTE</div>
    </div>
    <div class="vote-grid">
      <button class="vote-btn selected-red" onclick="confVote('${voter}',true)">🌶️ SPICY</button>
      <button class="vote-btn" onclick="confVote('${voter}',false)">😐 MILD</button>
    </div>
  `);
}

function confVote(voter, spicy) {
  state.confVotes[voter] = spicy;
  renderConfVote();
}

function confNext() {
  state.pendingAction = null;
  state.turn++;
  renderConf();
}

// ── TWO TRUTHS AND A LIE ───────────────────────────────
function renderTTL() {
  const player = currentPlayer();

  if (state.ttlPhase === 'input') {
    setContent(`
      ${turnHeader(player, 'TWO TRUTHS & A LIE')}
      <div class="label">enter 3 statements — 2 true, 1 lie:</div>
      <div class="prompt-line mt8"><span class="prompt-sign color-cyan">[1]</span>
        <input class="prompt-input" id="ttl-s1" placeholder="Statement 1"></div>
      <div class="prompt-line mt8"><span class="prompt-sign color-cyan">[2]</span>
        <input class="prompt-input" id="ttl-s2" placeholder="Statement 2"></div>
      <div class="prompt-line mt8"><span class="prompt-sign color-cyan">[3]</span>
        <input class="prompt-input" id="ttl-s3" placeholder="Statement 3"></div>
      <div class="label mt16">which number is the lie?</div>
      <div class="vote-grid mt8">
        <button class="vote-btn" onclick="ttlSetLie(0)">[1]</button>
        <button class="vote-btn" onclick="ttlSetLie(1)">[2]</button>
      </div>
      <button class="vote-btn mt8" style="width:100%" onclick="ttlSetLie(2)">[3]</button>
    `);
    return;
  }

  if (state.ttlPhase === 'guess') { renderTTLGuess(); return; }

  if (state.ttlPhase === 'result') {
    setContent(`${state.ttlResult}<button class="btn btn-dim mt16" onclick="ttlNext()">next →</button>`);
    return;
  }
}

function ttlSetLie(idx) {
  const s1 = document.getElementById('ttl-s1')?.value.trim();
  const s2 = document.getElementById('ttl-s2')?.value.trim();
  const s3 = document.getElementById('ttl-s3')?.value.trim();
  if (!s1 || !s2 || !s3) { alert('Fill in all 3 statements first!'); return; }
  state.ttlStatements = [s1, s2, s3];
  state.ttlLieIdx = idx;
  state.ttlGuesses = {};
  state.ttlPhase = 'guess';
  renderTTLGuess();
}

function renderTTLGuess() {
  const player = currentPlayer();
  const guessers = state.players.filter(p => p !== player);
  const guessed = Object.keys(state.ttlGuesses);
  const remaining = guessers.filter(p => !guessed.includes(p));
  const guesser = remaining[0];

  if (!guesser) {
    const correct = Object.entries(state.ttlGuesses).filter(([,g])=>g===state.ttlLieIdx).map(([p])=>p);
    const wrong   = Object.entries(state.ttlGuesses).filter(([,g])=>g!==state.ttlLieIdx).map(([p])=>p);
    wrong.forEach(p => addSips(p,1));
    if (!correct.length) state.players.filter(p=>p!==player).forEach(p=>addSips(p,2));

    const lie = state.ttlStatements[state.ttlLieIdx];
    let result = `<div class="result-box" style="border-color:var(--green)">
      <div class="result-emoji">🎭</div>
      <div class="result-text">The lie was: <strong>${lie}</strong></div>
    </div>`;
    if (wrong.length) result += drinkResult(wrong.join(', '), 1, `${wrong.join(', ')} guessed wrong — 1 sip!`);
    if (!correct.length) result += `<div class="result-box" style="border-color:var(--red)"><div class="result-text color-red">Nobody got it! Everyone else drinks 2 sips!</div></div>`;

    state.ttlResult = result;
    state.ttlPhase = 'result';
    setContent(`${result}<button class="btn btn-dim mt16" onclick="ttlNext()">next →</button>`);
    return;
  }

  const i = state.players.indexOf(guesser);
  const c = chipColor(i);
  setContent(`
    <div class="label">${player}'s statements:</div>
    ${state.ttlStatements.map((s,idx)=>`<div class="statement" style="margin-bottom:8px">[${idx+1}] ${s}</div>`).join('')}
    <div class="turn-hdr">
      <div class="turn-name" style="color:${c.color}">${guesser}</div>
      <div class="turn-sub">WHICH IS THE LIE?</div>
    </div>
    <div style="display:flex;gap:8px">
      ${[0,1,2].map(idx=>`<button class="vote-btn" style="flex:1" onclick="ttlGuess('${guesser}',${idx})">[${idx+1}]</button>`).join('')}
    </div>
  `);
}

function ttlGuess(guesser, idx) {
  state.ttlGuesses[guesser] = idx;
  renderTTLGuess();
}

function ttlNext() {
  state.ttlPhase = 'input';
  state.ttlStatements = [];
  state.ttlGuesses = {};
  state.turn++;
  renderTTL();
}
</script>
